---
# Sync cert-manager wildcard certificate to Synology DSM nodes
# Flow: K8s cert-manager secret -> Synology nodes via SSH (become root)
# Idempotent: skips if archive cert expiry matches K8s cert expiry
#
# Hosts group required: synology
#   nl-nas01  (DSM 7.2.2, admin user, cert ID: kGGjNn)
#   nlsyno02  (DSM 7.1.1, synoadm user, cert ID: O4ltpz)
#
# AWX connection requirements per host:
#   ansible_ssh_transfer_method: scp   (Synology lacks SFTP)
#   ansible_python_interpreter: /usr/bin/python3
#   become: true / become_method: sudo
#
# Cert archive path:  REDACTED_2603edc7/_archive/<ID>/
# Service dirs:       parsed dynamically from INFO JSON
# Reload:             synow3tool --gen-all + systemctl reload nginx
#
# Credentials from AWX/OpenBao custom credentials:
#   K8s API: K8S_HOST, K8S_TOKEN, K8S_CA_CERT

- name: Fetch certificate from Kubernetes
  hosts: localhost
  gather_facts: false
  vars:
    k8s_secret_name: REDACTED_0d82b4df-tls
    k8s_secret_namespace: cert-manager
    temp_dir: REDACTED_88f47687

  tasks:
    - name: Create temp directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: directory
        mode: '0700'

    - name: Set credentials from environment
      ansible.builtin.set_fact:
        k8s_host: "{{ lookup('env', 'K8S_HOST') }}"
        k8s_token: "{{ lookup('env', 'K8S_TOKEN') }}"
        k8s_ca_cert: "{{ lookup('env', 'K8S_CA_CERT') }}"
      no_log: true

    - name: Write CA cert to temp file
      ansible.builtin.copy:
        content: "{{ k8s_ca_cert }}"
        dest: "{{ temp_dir }}/ca.crt"
        mode: '0600'

    - name: Get TLS secret from K8s API
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ k8s_secret_namespace }}/secrets/{{ k8s_secret_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        ca_path: "{{ temp_dir }}/ca.crt"
        validate_certs: true
        return_content: true
      register: k8s_secret
      no_log: true

    - name: Decode and save fullchain cert
      ansible.builtin.copy:
        content: "{{ k8s_secret.json.data['tls.crt'] | b64decode }}"
        dest: "{{ temp_dir }}/fullchain.pem"
        mode: '0600'
      no_log: true

    - name: Decode and save private key
      ansible.builtin.copy:
        content: "{{ k8s_secret.json.data['tls.key'] | b64decode }}"
        dest: "{{ temp_dir }}/privkey.pem"
        mode: '0600'
      no_log: true

    - name: Extract leaf cert from fullchain
      ansible.builtin.command:
        cmd: openssl x509 -in "{{ temp_dir }}/fullchain.pem" -out "{{ temp_dir }}/cert.pem"
      changed_when: false

    - name: Get K8s certificate expiry
      ansible.builtin.command:
        cmd: openssl x509 -enddate -noout -in "{{ temp_dir }}/fullchain.pem"
      register: k8s_cert_expiry_raw
      changed_when: false

    - name: Parse K8s certificate expiry to ISO format
      ansible.builtin.command:
        cmd: date -d "{{ k8s_cert_expiry_raw.stdout | regex_replace('notAfter=', '') }}" -u +%Y-%m-%dT%H:%M:%S
      register: k8s_cert_expiry
      changed_when: false

    - name: Display K8s certificate expiry
      ansible.builtin.debug:
        msg: "K8s certificate expires: {{ k8s_cert_expiry.stdout }}"


- name: Deploy certificate to Synology nodes
  hosts: synology
  gather_facts: false
  become: true
  become_method: sudo
  vars:
    ansible_ssh_transfer_method: piped
    ansible_python_interpreter: /usr/bin/python3
    temp_dir: REDACTED_88f47687
    syno_temp_dir: /tmp/syno-cert-update
    k8s_cert_expiry: "{{ hostvars['localhost']['k8s_cert_expiry']['stdout'] }}"

  tasks:
    - name: Get default certificate ID
      ansible.builtin.command:
        cmd: cat REDACTED_2603edc7/_archive/DEFAULT
      register: cert_id
      changed_when: false

    - name: Check current cert expiry on Synology node
      ansible.builtin.shell:
        cmd: |
          CERT_FILE="REDACTED_2603edc7/_archive/{{ cert_id.stdout }}/cert.pem"
          if [ -f "$CERT_FILE" ]; then
            DATE=$(openssl x509 -enddate -noout -in "$CERT_FILE" | sed 's/notAfter=//')
            date -d "$DATE" -u +%Y-%m-%dT%H:%M:%S
          else
            echo "NONE"
          fi
      register: syno_cert_expiry
      changed_when: false

    - name: Display current Synology cert expiry
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} current cert expires: {{ syno_cert_expiry.stdout }} (cert ID: {{ cert_id.stdout }})"

    - name: Set sync flag
      ansible.builtin.set_fact:
        sync_needed: "{{ syno_cert_expiry.stdout == 'NONE' or k8s_cert_expiry != syno_cert_expiry.stdout }}"

    - name: Display sync decision
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{
            'Sync needed - deploying new certificate'
            if sync_needed else
            'Sync NOT needed - certificate already current (' + k8s_cert_expiry + ')'
          }}

    - name: Create temp directory on Synology
      ansible.builtin.file:
        path: "{{ syno_temp_dir }}"
        state: directory
        mode: '0700'
      when: sync_needed

    - name: Upload cert.pem to Synology
      ansible.builtin.copy:
        src: "{{ temp_dir }}/cert.pem"
        dest: "{{ syno_temp_dir }}/cert.pem"
        mode: '0600'
      when: sync_needed

    - name: Upload fullchain.pem to Synology
      ansible.builtin.copy:
        src: "{{ temp_dir }}/fullchain.pem"
        dest: "{{ syno_temp_dir }}/fullchain.pem"
        mode: '0600'
      when: sync_needed

    - name: Upload privkey.pem to Synology
      ansible.builtin.copy:
        src: "{{ temp_dir }}/privkey.pem"
        dest: "{{ syno_temp_dir }}/privkey.pem"
        mode: '0600'
      no_log: true
      when: sync_needed

    - name: Update certificate archive and all service directories
      ansible.builtin.shell:
        cmd: |
          set -e
          CERT_ID=$(cat REDACTED_2603edc7/_archive/DEFAULT)
          ARCHIVE_DIR="REDACTED_2603edc7/_archive/$CERT_ID"

          # Update archive directory
          for f in cert.pem fullchain.pem privkey.pem; do
            cp {{ syno_temp_dir }}/$f "$ARCHIVE_DIR/$f"
            chmod 400 "$ARCHIVE_DIR/$f"
            chown root:root "$ARCHIVE_DIR/$f"
          done

          # Update all service directories with correct ownership
          python3 << 'PYEOF'
          import json, shutil, os, pwd, stat

          with open('REDACTED_2603edc7/_archive/INFO') as fh:
              info = json.load(fh)

          cert_id = open('REDACTED_2603edc7/_archive/DEFAULT').read().strip()
          services = info.get(cert_id, {}).get('services', [])

          for svc in services:
              base = '/usr/local/etc/certificate' if svc.get('isPkg') else 'REDACTED_2603edc7'
              svc_dir = '{}/{}/{}'.format(base, svc['subscriber'], svc['service'])

              if not os.path.isdir(svc_dir):
                  print('Skipping missing dir: {}'.format(svc_dir))
                  continue

              owner = svc.get('owner', 'root')
              try:
                  pw = pwd.getpwnam(owner)
                  uid, gid = pw.pw_uid, pw.pw_gid
              except KeyError:
                  uid, gid = 0, 0

              for fname in ['cert.pem', 'fullchain.pem', 'privkey.pem']:
                  src = '/tmp/syno-cert-update/{}'.format(fname)
                  dst = '{}/{}'.format(svc_dir, fname)
                  shutil.copy2(src, dst)
                  os.chmod(dst, 0o400)
                  os.chown(dst, uid, gid)

              print('Updated: {}'.format(svc_dir))
          PYEOF
      register: update_result
      changed_when: true
      when: sync_needed

    - name: Display service directory update results
      ansible.builtin.debug:
        msg: "{{ update_result.stdout_lines }}"
      when: sync_needed

    - name: Regenerate nginx obfuscated cert configs
      ansible.builtin.command:
        cmd: /usr/syno/bin/synow3tool --gen-all
      changed_when: true
      when: sync_needed

    - name: Reload nginx
      ansible.builtin.shell:
        cmd: systemctl reload nginx || synosystemctl reload nginx
      changed_when: true
      when: sync_needed

    - name: Cleanup temp directory on Synology
      ansible.builtin.file:
        path: "{{ syno_temp_dir }}"
        state: absent

    - name: Final status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{
            'Certificate deployed to archive and ' + (update_result.stdout_lines | default([]) | length | string) + ' service directories updated. Nginx reloaded.'
            if sync_needed else
            'No sync needed - certificate already current.'
          }}


- name: Cleanup temp directory on localhost
  hosts: localhost
  gather_facts: false
  vars:
    temp_dir: REDACTED_88f47687

  tasks:
    - name: Remove temp directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: absent
