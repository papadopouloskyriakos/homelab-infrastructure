---
# Send maintenance summary email report.
#
# Required variables:
#   site: "nl" or "gr"
#   report_data: dict with maintenance results
#     - start_time: ISO timestamp
#     - end_time: ISO timestamp
#     - node_updates: list of {node, kernel_before, kernel_after, packages_changed}
#     - health_checks: list of {service, status, note}
#     - issues: list of strings (manual intervention items)
#     - timeline: list of {time, event}
#
# Optional variables:
#   email_to: recipient (default: root)
#   smtp_host: relay host (default: 10.0.X.X)
#   smtp_port: relay port (default: 25)
#   operator: who ran it (default: AWX)
#
# Uses local sendmail/mail command via SMTP relay.

- name: "[EMAIL] Set email variables"
  set_fact:
    _email_to: "{{ email_to | default('root') }}"
    _smtp_host: "{{ smtp_host | default('10.0.X.X') }}"
    _smtp_port: "{{ smtp_port | default(25) }}"
    _site_label: "{{ 'NL (nl)' if site == 'nl' else 'GR (gr)' }}"
    _operator: "{{ operator | default('AWX') }}"
    _date: "{{ now(utc=true, fmt='%Y-%m-%d') }}"

- name: "[EMAIL] Build report body"
  set_fact:
    _email_subject: "[{{ site | upper }}] PVE Maintenance Complete — {{ _date }}"
    _email_body: |
      PVE Kernel Maintenance Report
      =============================
      Site: {{ _site_label }}
      Date: {{ _date }}
      Duration: {{ report_data.start_time }} — {{ report_data.end_time }}
      Operator: {{ _operator }}

      Node Updates:
      {% for node in report_data.node_updates | default([]) %}
        {{ node.node }}: {{ node.kernel_before | default('unknown') }} -> {{ node.kernel_after | default('unknown') }} ({{ node.packages_changed | default('unknown') }} packages)
      {% endfor %}

      Service Health (post-maintenance):
      {% for check in report_data.health_checks | default([]) %}
        {{ 'PASS' if check.status == 'ok' else 'FAIL' }} {{ check.service }}{{ ' — ' ~ check.note if check.note | default('') else '' }}
      {% endfor %}

      Issues Requiring Manual Intervention:
      {% if report_data.issues | default([]) | length > 0 %}
      {% for issue in report_data.issues %}
        - {{ issue }}
      {% endfor %}
      {% else %}
        None
      {% endif %}

      Timeline:
      {% for event in report_data.timeline | default([]) %}
        {{ event.time }} {{ event.event }}
      {% endfor %}

      ---
      Generated by AWX PVE Maintenance playbook

- name: "[EMAIL] Send report via SMTP relay"
  shell: |
    cat <<'EMAILEOF' | sendmail -t -S {{ _smtp_host }}:{{ _smtp_port }}
    To: {{ _email_to }}
    Subject: {{ _email_subject }}
    Content-Type: text/plain; charset=utf-8

    {{ _email_body }}
    EMAILEOF
  register: email_result
  failed_when: false

- name: "[EMAIL] Report send result"
  debug:
    msg: >-
      {% if email_result.rc == 0 %}
      [EMAIL] Maintenance report sent to {{ _email_to }}
      {% else %}
      [EMAIL] WARNING: Failed to send email (rc={{ email_result.rc }}). Report saved to job output.
      {{ email_result.stderr | default('no error output') }}
      {% endif %}
