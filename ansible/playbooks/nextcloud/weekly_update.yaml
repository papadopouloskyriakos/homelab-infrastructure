###############################################################################
# Play 4: Summary
###############################################################################
- name: Nextcloud weekly update summary
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Display completion summary
      debug:
        msg: |
          Nextcloud weekly update completed successfully.

          Update start: {{ nc_update_start }}
          Update end:   {{ now(utc=true) }}

          nlnc01:
            PHP version: {{ nc01_php_before | default('unknown') }} -> {{ nc01_php_after | default('unknown') }}
            Packages upgraded: {{ nc01_apt_changed | default('unknown') }}
            Symlinks verified: yes
            Services healthy: yes

          nlnc02:
            PHP version: {{ nc02_php_before | default('unknown') }} -> {{ nc02_php_after | default('unknown') }}
            Packages upgraded: {{ nc02_apt_changed | default('unknown') }}
            Symlinks verified: yes
            Services healthy: yes

          Both nodes updated, rebooted, and verified.
