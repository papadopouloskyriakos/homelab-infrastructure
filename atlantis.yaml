version: 3
automerge: false
parallel_plan: true
parallel_apply: false
projects:
  - name: k8s
    dir: k8s
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "**/*.tf"
        - "*.tfvars"
    workflow: opentofu-k8s
workflows:
  opentofu-k8s:
    plan:
      steps:
        - init
        - plan
    apply:
      steps:
        - apply
