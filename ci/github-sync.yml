# ===========================================================================
# GITHUB PUBLIC MIRROR PIPELINE
# Sanitizes and syncs selected content to public GitHub repository
# ===========================================================================
# Uses: github-sync-runner image with pre-installed tools and configs
# Logic: /usr/local/share/github-sync/sync-to-github.sh (baked into image)
# Configs: /etc/gitleaks/gitleaks.toml, /etc/github-sync/replacements.txt
# Source: images/github-sync-runner/ (build via ci/images.yml)
# Triggers: On every push to main
# Target: github.com/$GITHUB_REPO
# ===========================================================================

variables:
  GITHUB_SYNC_IMAGE: "registry.example.net/infrastructure/nl/production/github-sync-runner:latest"

.github_sync_base:
  image: $GITHUB_SYNC_IMAGE
  tags:
    - docker
  variables:
    GIT_STRATEGY: none
    COMMON_REPO_URL: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.example.net/infrastructure/common/production.git"

# ===========================================================================
# SYNC TO GITHUB
# ===========================================================================

sync_to_github:
  extends: .github_sync_base
  needs: []
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - /usr/local/share/github-sync/sync-to-github.sh --verbose
  environment:
    name: github-public
    url: https://github.com/$GITHUB_REPO

# ===========================================================================
# DRY RUN - Test without pushing
# ===========================================================================

github_sync_dry_run:
  extends: .github_sync_base
  needs: []
  stage: validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  script:
    - /usr/local/share/github-sync/sync-to-github.sh --dry-run --verbose

# NOTE: Runner image build moved to ci/images.yml (images/github-sync-runner/)
