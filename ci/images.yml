# ===========================================================================
# CI RUNNER IMAGE BUILD PIPELINE
# Builds and pushes runner images to the private registry
# ===========================================================================
# Triggers: Manual, on changes to images/**/* on main
# Registry: registry.example.net/infrastructure/nl/production/
# ===========================================================================

variables:
  IMAGE_REGISTRY: "registry.example.net/infrastructure/nl/production"

.image_build_base:
  stage: .pre
  image: docker:24
  services:
    - docker:24-dind
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  environment:
    name: docker-registry
  allow_failure: true

# ===========================================================================
# CISCO EXECUTION ENVIRONMENT
# ===========================================================================

build_cisco_ee:
  extends: .image_build_base
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - images/cisco-ee/**/*
      when: manual
  script:
    - |
      cd images/cisco-ee
      docker build -t $IMAGE_REGISTRY/cisco-ee:latest .
      docker push $IMAGE_REGISTRY/cisco-ee:latest

# ===========================================================================
# DOCKER RUNNER
# ===========================================================================

