# ===========================================================================
# LXC CONTAINER MANAGEMENT PIPELINE
# Handles LXC container configuration deployment on Proxmox hosts
# ===========================================================================

.lxc_base:
  image: $PVE_IMAGE
  tags:
    - lxc
  before_script:
    - mkdir -p ~/.ssh
    - base64 -d $CI_PROJECT_DIR/.ssh/one_key.b64 > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - |
      if ! ssh-keygen -y -P "" -f ~/.ssh/id_ed25519 > /dev/null 2>&1; then
        echo "ERROR: Invalid or corrupted SSH key"
        exit 1
      fi

# ===========================================================================
# VALIDATION
# ===========================================================================

validate_lxc_configs:
  extends: .lxc_base
  stage: validate
  rules:
    - if: '$CI_COMMIT_AUTHOR_NAME == "GitLab CI Auto-Sync"'
      when: never
    - changes:
        - pve/**/lxc/*.conf
      when: on_success
  script:
    - |
      set -eu
      
      echo "================================================"
      echo "Validating LXC Configuration Changes"
      echo "================================================"
      
      CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'pve/.*/lxc/.*\.conf' || true)
      
      if [ -z "$CHANGED" ]; then
        echo "No LXC configuration changes detected"
        exit 0
      fi
      
      echo "Changed configuration files:"
      echo "$CHANGED" | sed 's/^/  /'
      echo "================================================"
      echo ""
      
      VALIDATION_FAILED=0
      
      for file in $CHANGED; do
        HOSTNAME=$(echo "$file" | cut -d'/' -f2)
        VMID=$(basename "$file" .conf)
        
        echo "Validating $VMID on $HOSTNAME..."
        
        # Check file exists and not empty
        if [ ! -f "$CI_PROJECT_DIR/$file" ]; then
          echo "  ERROR: File not found: $file"
          VALIDATION_FAILED=1
          continue
        fi
        
        if [ ! -s "$CI_PROJECT_DIR/$file" ]; then
          echo "  ERROR: File is empty: $file"
          VALIDATION_FAILED=1
          continue
        fi
        
        # Validate VMID format (Proxmox allows 100-999999999)
        if ! echo "$VMID" | grep -qE '^[0-9]{3,9}$'; then
          echo "  ERROR: Invalid VMID format: $VMID"
          echo "         VMID must be 3-9 digits"
          VALIDATION_FAILED=1
          continue
        fi
        
        # Check for required LXC config parameters
        if ! grep -qE "^(arch|cores|memory|rootfs|ostype)" "$CI_PROJECT_DIR/$file"; then
          echo "  WARNING: Config missing common LXC parameters"
        fi
        
        # Add host to known_hosts
        ssh-keyscan -H "$HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Validate SSH connection to host
        echo "  Validating connection to $HOSTNAME..."
        if ! ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
             root@"$HOSTNAME" "echo 'connected'" &>/dev/null; then
          echo "  ERROR: Cannot connect to $HOSTNAME"
          VALIDATION_FAILED=1
          continue
        fi
        
        # Verify container exists on host
        if ! ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
             root@"$HOSTNAME" "pct config $VMID" &>/dev/null; then
          echo "  WARNING: Container $VMID not found on $HOSTNAME"
          echo "  This may be a new container deployment"
        else
          echo "  PASS: Container exists on host"
        fi
        
        echo "  PASS: Validation complete for $VMID"
      done
      
      if [ $VALIDATION_FAILED -eq 1 ]; then
        echo ""
        echo "ERROR: One or more validations failed"
        exit 1
      fi
      
      echo ""
      echo "SUCCESS: All LXC configurations validated"
  allow_failure: false

# ===========================================================================
# PRE-DEPLOY DRIFT GATE (Phase 3)
# Blocks deployment if PVE has manual changes not in Git history.
# 3-way compare: live PVE vs HEAD vs HEAD^ per VMID.
# ===========================================================================

pre_deploy_lxc_drift_gate:
  extends: .lxc_base
  stage: validate
  rules:
    - if: '$CI_COMMIT_AUTHOR_NAME == "GitLab CI Auto-Sync"'
      when: never
    - changes:
        - pve/**/lxc/*.conf
      when: on_success
  script:
    - |
      set -eu

      echo "================================================"
      echo "Pre-Deploy Drift Gate — LXC Configs"
      echo "================================================"

      CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'pve/.*/lxc/.*\.conf' || true)

      if [ -z "$CHANGED" ]; then
        echo "No LXC configuration changes detected"
        exit 0
      fi

      echo "Checking drift for:"
      echo "$CHANGED" | sed 's/^/  /'
      echo ""

      GATE_FAILED=0

      for file in $CHANGED; do
        PVE_HOST=$(echo "$file" | cut -d'/' -f2)
        VMID=$(basename "$file" .conf)

        bash pve/scripts/pve_drift_gate.sh lxc "$PVE_HOST" "$VMID"
        RC=$?

        if [ $RC -eq 2 ]; then
          echo ""
          echo "DRIFT DETECTED — DEPLOYMENT BLOCKED for ${VMID}"
          GATE_FAILED=1
        elif [ $RC -ne 0 ]; then
          echo "ERROR checking drift for ${VMID} (exit $RC)"
          GATE_FAILED=1
        fi
      done

      if [ $GATE_FAILED -eq 1 ]; then
        echo ""
        echo "================================================"
        echo "DEPLOYMENT BLOCKED — resolve drift before deploying"
        echo "Run sync_pve_drift to sync PVE state, then rebase."
        echo "================================================"
        exit 1
      fi

      echo ""
      echo "SUCCESS: No drift detected — safe to deploy"
  allow_failure: false

# ===========================================================================
# DEPLOYMENT
# ===========================================================================

deploy_lxc_configs:
  extends: .lxc_base
  stage: deploy
  rules:
    - if: '$CI_COMMIT_AUTHOR_NAME == "GitLab CI Auto-Sync"'
      when: never
    - changes:
        - pve/**/lxc/*.conf
      when: on_success
  needs:
    - validate_lxc_configs
    - pre_deploy_lxc_drift_gate
  script:
    - |
      set -eu
      
      echo "================================================"
      echo "Deploying LXC Container Configurations"
      echo "================================================"
      
      CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'pve/.*/lxc/.*\.conf' || true)
      
      if [ -z "$CHANGED" ]; then
        echo "No LXC configuration changes detected"
        exit 0
      fi
      
      echo "Changed configuration files:"
      echo "$CHANGED" | sed 's/^/  /'
      echo "================================================"
      echo ""
      
      DEPLOYMENT_FAILED=0
      
      for file in $CHANGED; do
        HOSTNAME=$(echo "$file" | cut -d'/' -f2)
        VMID=$(basename "$file" .conf)
        
        echo "========================================"
        echo "Deploying LXC $VMID on $HOSTNAME"
        echo "========================================"
        
        ssh-keyscan -H "$HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Validate SSH connection
        echo "Validating connection to $HOSTNAME..."
        if ! ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
             root@"$HOSTNAME" "echo 'connected'" &>/dev/null; then
          echo "ERROR: Cannot connect to $HOSTNAME"
          DEPLOYMENT_FAILED=1
          continue
        fi
        
        # Create backup directory on host
        echo "Creating backup directory..."
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          root@"$HOSTNAME" \
          "mkdir -p $PVE_BACKUP_DIR"
        
        # Backup current configuration
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        BACKUP_FILE="$PVE_BACKUP_DIR/${VMID}_${TIMESTAMP}.conf"
        
        echo "Backing up current config to $BACKUP_FILE..."
        if ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
             root@"$HOSTNAME" "test -f /etc/pve/lxc/${VMID}.conf"; then
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@"$HOSTNAME" \
            "cp /etc/pve/lxc/${VMID}.conf $BACKUP_FILE"
          echo "  Backup created: $BACKUP_FILE"
        else
          echo "  No existing config to backup (new container)"
        fi
        
        # Stop container gracefully
        echo "Stopping container $VMID..."
        if ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
             root@"$HOSTNAME" "pct status $VMID" 2>/dev/null | grep -q "running"; then
          
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@"$HOSTNAME" \
            "pct shutdown $VMID --timeout 30 || pct stop $VMID"
          
          echo "  Container stopped"
        else
          echo "  Container already stopped"
        fi
        
        # Create temp staging directory
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          root@"$HOSTNAME" \
          "mkdir -p $PVE_TEMP_CONFIG_DIR"
        
        # Copy new config to staging
        TEMP_CONFIG="$PVE_TEMP_CONFIG_DIR/${VMID}.conf"
        echo "Uploading new configuration..."
        scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          "$CI_PROJECT_DIR/$file" \
          "root@$HOSTNAME:$TEMP_CONFIG"
        
        # Verify config was uploaded
        if ! ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
             root@"$HOSTNAME" "test -f $TEMP_CONFIG"; then
          echo "ERROR: Failed to upload config to $HOSTNAME"
          DEPLOYMENT_FAILED=1
          continue
        fi
        
        # Replace production config
        echo "Deploying configuration..."
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          root@"$HOSTNAME" \
          "cp $TEMP_CONFIG /etc/pve/lxc/${VMID}.conf"
        
        # Verify deployment
        if ! ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
             root@"$HOSTNAME" \
             "diff -q $TEMP_CONFIG /etc/pve/lxc/${VMID}.conf" &>/dev/null; then
          echo "ERROR: Config verification failed"
          echo "Rolling back to backup..."
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@"$HOSTNAME" \
            "cp $BACKUP_FILE /etc/pve/lxc/${VMID}.conf"
          DEPLOYMENT_FAILED=1
          continue
        fi
        
        echo "  Configuration deployed successfully"
        
        # Start container
        echo "Starting container $VMID..."
        if ! ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
             root@"$HOSTNAME" \
             "timeout $PVE_DEPLOYMENT_TIMEOUT pct start $VMID"; then
          echo "ERROR: Failed to start container"
          echo "Rolling back to backup..."
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@"$HOSTNAME" \
            "cp $BACKUP_FILE /etc/pve/lxc/${VMID}.conf && pct start $VMID"
          DEPLOYMENT_FAILED=1
          continue
        fi
        
        echo "  Container started successfully"
        
        # Cleanup staging
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          root@"$HOSTNAME" \
          "rm -f $TEMP_CONFIG"
        
        echo "SUCCESS: $VMID deployed on $HOSTNAME"
        echo ""
      done
      
      if [ $DEPLOYMENT_FAILED -eq 1 ]; then
        echo "================================================"
        echo "ERROR: One or more deployments failed"
        echo "================================================"
        exit 1
      fi
      
      echo "================================================"
      echo "SUCCESS: All LXC configurations deployed"
      echo "================================================"
  environment: production
  allow_failure: false

# ===========================================================================
# POST-DEPLOYMENT VERIFICATION
# ===========================================================================

verify_lxc_deployments:
  extends: .lxc_base
  stage: verify
  rules:
    - if: '$CI_COMMIT_AUTHOR_NAME == "GitLab CI Auto-Sync"'
      when: never
    - changes:
        - pve/**/lxc/*.conf
      when: on_success
  needs:
    - deploy_lxc_configs
  script:
    - |
      set -eu
      
      echo "================================================"
      echo "LXC Deployment Verification"
      echo "================================================"
      
      CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'pve/.*/lxc/.*\.conf' || true)
      
      if [ -z "$CHANGED" ]; then
        echo "No changes to verify"
        exit 0
      fi
      
      echo "Waiting 10 seconds for containers to stabilize..."
      sleep 10
      
      VERIFICATION_FAILED=0
      
      for file in $CHANGED; do
        HOSTNAME=$(echo "$file" | cut -d'/' -f2)
        VMID=$(basename "$file" .conf)
        
        echo ""
        echo "Verifying LXC $VMID on $HOSTNAME..."
        
        ssh-keyscan -H "$HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Check container status
        STATUS=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          root@"$HOSTNAME" "pct status $VMID" || echo "ERROR")
        
        echo "  Status: $STATUS"
        
        if echo "$STATUS" | grep -q "running"; then
          echo "  PASS: Container is running"
        else
          echo "  ERROR: Container not running"
          VERIFICATION_FAILED=1
        fi
      done
      
      if [ $VERIFICATION_FAILED -eq 1 ]; then
        echo ""
        echo "WARNING: Some verifications failed"
        echo "Check container logs for details"
      else
        echo ""
        echo "SUCCESS: All containers verified running"
      fi
  artifacts:
    when: always
    expire_in: 7 days
  allow_failure: true

# ===========================================================================
# DRIFT DETECTION - PVE as Source of Truth
# ===========================================================================

detect_pve_lxc_drift:
  extends: .lxc_base
  stage: drift-detection
  allow_failure:
    exit_codes:
      - 1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: manual
      allow_failure: true
  script:
    - |
      cd $CI_PROJECT_DIR
      bash pve/scripts/pve_detect_drift.sh
  artifacts:
    when: always
    paths:
      - drift_report.txt
    expire_in: 7 days

# ===========================================================================
# PVE DRIFT AUTO-SYNC (Phase 2)
# Syncs drifted/new/removed PVE configs from live hosts to Git.
# Uses "GitLab CI Auto-Sync" author — deploy jobs skip this author.
# Handles both LXC and QEMU configs in a single job.
# ===========================================================================

sync_pve_drift:
  extends: .openbao-pve-with-git
  stage: drift-detection
  allow_failure:
    exit_codes:
      - 1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: manual
      allow_failure: true
  script:
    - |
      cd $CI_PROJECT_DIR
      bash pve/scripts/pve_sync_drift.sh