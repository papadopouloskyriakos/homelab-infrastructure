# =============================================================================
# OpenBao JWT Authentication Template
# =============================================================================
# Usage:
#   extends: .openbao-auth
#   script:
#     - # BAO_TOKEN is set, use fetch_secret function
#     - export MY_PASS=$(fetch_secret "ci/myapp" "password")
# =============================================================================

variables:
  BAO_ADDR: "http://10.0.X.X:8200"
  BAO_ROLE: "gitlab-ci"

# -----------------------------------------------------------------------------
# Base OpenBao REDACTED_6fa691d2 template
# -----------------------------------------------------------------------------
.openbao-auth:
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.example.net
  before_script:
    - echo "[OpenBao] Authenticating with role ${BAO_ROLE}..."
    - if [ -z "${VAULT_ID_TOKEN}" ]; then echo "[OpenBao] ERROR - VAULT_ID_TOKEN not set"; exit 1; fi
    - AUTH_RESPONSE=$(curl -sf --max-time 30 --request POST --header "Content-Type:application/json" --data "{\"jwt\":\"${VAULT_ID_TOKEN}\",\"role\":\"${BAO_ROLE}\"}" "${BAO_ADDR}/v1/auth/jwt/login")
    - export BAO_TOKEN=$(echo "${AUTH_RESPONSE}" | jq -r '.auth.client_token // empty')
    - if [ -z "${BAO_TOKEN}" ]; then echo "[OpenBao] ERROR - Authentication failed"; echo "${AUTH_RESPONSE}"; exit 1; fi
    - echo "[OpenBao] Authentication successful"
    - |
      # Helper function: fetch_secret <path> <field>
      fetch_secret() {
        curl -sf --header "X-Vault-Token:${BAO_TOKEN}" "${BAO_ADDR}/v1/secret/data/${1}" | jq -r ".data.data.${2} // empty"
      }

# -----------------------------------------------------------------------------
# Cisco pipelines - extends openbao-auth + sets CISCO_* env vars
# -----------------------------------------------------------------------------
.openbao-cisco:
  extends: .openbao-auth
  before_script:
    - echo "[OpenBao] Authenticating with role ${BAO_ROLE}..."
    - if [ -z "${VAULT_ID_TOKEN}" ]; then echo "[OpenBao] ERROR - VAULT_ID_TOKEN not set"; exit 1; fi
    - AUTH_RESPONSE=$(curl -sf --max-time 30 --request POST --header "Content-Type:application/json" --data "{\"jwt\":\"${VAULT_ID_TOKEN}\",\"role\":\"${BAO_ROLE}\"}" "${BAO_ADDR}/v1/auth/jwt/login")
    - export BAO_TOKEN=$(echo "${AUTH_RESPONSE}" | jq -r '.auth.client_token // empty')
    - if [ -z "${BAO_TOKEN}" ]; then echo "[OpenBao] ERROR - Authentication failed"; echo "${AUTH_RESPONSE}"; exit 1; fi
    - echo "[OpenBao] Authentication successful"
    - echo "[OpenBao] Fetching Cisco credentials..."
    - CISCO_SECRET=$(curl -sf --header "X-Vault-Token:${BAO_TOKEN}" "${BAO_ADDR}/v1/secret/data/ci/cisco")
    - export CISCO_USER=$(echo "${CISCO_SECRET}" | jq -r '.data.data.username')
    - export CISCO_PASSWORD=$(echo "${CISCO_SECRET}" | jq -r '.data.data.password')
    - export CISCO_ENABLE_SECRET=$(echo "${CISCO_SECRET}" | jq -r '.data.data.enable_secret')
    - if [ -z "${CISCO_PASSWORD}" ]; then echo "[OpenBao] ERROR - Failed to fetch Cisco credentials"; exit 1; fi
    - echo "[OpenBao] Cisco credentials loaded"
    - git config --global --add safe.directory $CI_PROJECT_DIR

# -----------------------------------------------------------------------------
# Cisco pipelines with GitLab push token (for drift sync jobs)
# -----------------------------------------------------------------------------
.openbao-cisco-with-git:
  extends: .openbao-auth
  before_script:
    - echo "[OpenBao] Authenticating with role ${BAO_ROLE}..."
    - if [ -z "${VAULT_ID_TOKEN}" ]; then echo "[OpenBao] ERROR - VAULT_ID_TOKEN not set"; exit 1; fi
    - AUTH_RESPONSE=$(curl -sf --max-time 30 --request POST --header "Content-Type:application/json" --data "{\"jwt\":\"${VAULT_ID_TOKEN}\",\"role\":\"${BAO_ROLE}\"}" "${BAO_ADDR}/v1/auth/jwt/login")
    - export BAO_TOKEN=$(echo "${AUTH_RESPONSE}" | jq -r '.auth.client_token // empty')
    - if [ -z "${BAO_TOKEN}" ]; then echo "[OpenBao] ERROR - Authentication failed"; echo "${AUTH_RESPONSE}"; exit 1; fi
    - echo "[OpenBao] Authentication successful"
    - echo "[OpenBao] Fetching Cisco credentials..."
    - CISCO_SECRET=$(curl -sf --header "X-Vault-Token:${BAO_TOKEN}" "${BAO_ADDR}/v1/secret/data/ci/cisco")
    - export CISCO_USER=$(echo "${CISCO_SECRET}" | jq -r '.data.data.username')
    - export CISCO_PASSWORD=$(echo "${CISCO_SECRET}" | jq -r '.data.data.password')
    - export CISCO_ENABLE_SECRET=$(echo "${CISCO_SECRET}" | jq -r '.data.data.enable_secret')
    - echo "[OpenBao] Fetching GitLab token..."
    - GITLAB_SECRET=$(curl -sf --header "X-Vault-Token:${BAO_TOKEN}" "${BAO_ADDR}/v1/secret/data/ci/gitlab")
    - export GITLAB_PUSH_TOKEN=$(echo "${GITLAB_SECRET}" | jq -r '.data.data.push_token')
    - if [ -z "${CISCO_PASSWORD}" ] || [ -z "${GITLAB_PUSH_TOKEN}" ]; then echo "[OpenBao] ERROR - Failed to fetch credentials"; exit 1; fi
    - echo "[OpenBao] All credentials loaded"
    - git config --global user.email "gitlab-ci@example.net"
    - git config --global user.name "GitLab CI Auto-Sync"
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - git config --global pull.rebase true
    - git remote set-url origin https://root:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
    - git checkout main || git checkout -b main
    - git pull origin main || echo "No remote main yet"

# =============================================================================
# Test Job - Run manually to verify OpenBao integration
# =============================================================================
test:openbao-jwt-auth:
  stage: .pre
  image: alpine:latest
  tags:
    - k8s
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.example.net
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "=== Step 1 - Check ID Token Availability ==="
    - if [ -n "${VAULT_ID_TOKEN}" ]; then echo "OK - VAULT_ID_TOKEN is available (${#VAULT_ID_TOKEN} chars)"; else echo "FAIL - VAULT_ID_TOKEN is NOT available"; exit 1; fi
    - echo ""
    - echo "=== Step 2 - Decode JWT Claims (with padding fix) ==="
    - PAYLOAD=$(echo ${VAULT_ID_TOKEN} | cut -d'.' -f2 | tr '_-' '/+' | awk '{l=length($0)%4; if(l==2) $0=$0"=="; else if(l==3) $0=$0"="; print}' | base64 -d 2>/dev/null) && echo "$PAYLOAD" | jq . || echo "Decode failed but continuing..."
    - echo ""
    - echo "=== Step 3 - Test OpenBao Authentication ==="
    - AUTH_RESPONSE=$(curl -s --request POST --header "Content-Type:application/json" --data "{\"jwt\":\"${VAULT_ID_TOKEN}\",\"role\":\"gitlab-ci\"}" ${BAO_ADDR}/v1/auth/jwt/login)
    - echo "Auth response - ${AUTH_RESPONSE}"
    - TOKEN=$(echo ${AUTH_RESPONSE} | jq -r '.auth.client_token')
    - if [ -n "${TOKEN}" ] && [ "${TOKEN}" != "null" ]; then echo "OK - Authentication successful"; export BAO_TOKEN="${TOKEN}"; else echo "FAIL - Authentication failed"; exit 1; fi
    - echo ""
    - echo "=== Step 4 - Retrieve Test Secret ==="
    - SECRET=$(curl -sf --header "X-Vault-Token:${BAO_TOKEN}" ${BAO_ADDR}/v1/secret/data/ci/test)
    - echo "Secret response - ${SECRET}"
    - API_KEY=$(echo ${SECRET} | jq -r '.data.data.api_key')
    - echo "OK - Retrieved api_key - ${API_KEY}"
  rules:
    - when: manual
  allow_failure: true
