captcha:
  service: cloudflare_turnstile
  site_key: "REDACTED_5914b0d0"
  secret_key: "REDACTED_fbd1d3dc"

email:
  from: "Matrix Server <noreply_matrix@example.net>"
  reply_to: "Matrix Support <support_matrix@example.net>"
  transport: smtp
  hostname: "10.0.X.X"
  port: 25
  mode: plain

database:
  kind: postgres
  uri: postgres://mas:REDACTED_ffef1e87@localhost:5432/mas

matrix:
  kind: synapse
  homeserver: matrix.example.net
  endpoint: http://localhost:8008
  secret: "REDACTED_419eedce"

clients:
  - client_id: "0000000000000000000SYNAPSE"
    client_auth_method: client_secret_basic
    client_secret: "REDACTED_419eedce"

# Password REDACTED_6fa691d2 settings
passwords:
  enabled: true
  minimum_complexity: 2  # 0-4 scale, 2 is moderate
  schemes:
    - version: 1
      algorithm: bcrypt      # For existing migrated users
    - version: 2
      algorithm: argon2id    # For new users

# Account management settings - THIS IS THE KEY SECTION FOR REGISTRATION
account:
  password_registration_enabled: true    # ENABLE WEB REGISTRATION
  password_registration_email_required: true
  password_change_allowed: true
  password_recovery_enabled: true        # Enable password reset via email
  email_change_allowed: true
  displayname_change_allowed: true

# Policy configuration - CORRECTED STRUCTURE
policy:
  # Use the default WASM module path for Docker
  wasm_module: /usr/local/share/mas-cli/policy.wasm

  # Policy entrypoints
  client_registration_entrypoint: client_registration/violation
  register_entrypoint: register/violation
  authorization_grant_entrypoint: authorization_grant/violation
  password_entrypoint: password/violation
  email_entrypoint: email/violation

  # Policy data - PROPER STRUCTURE
  data:
    # Optional: Restrict registration to specific email domains
    # Comment out or modify as needed
    # allowed_domains:
    #   - "*.example.net"
    #   - "gmail.com"

    # Optional: Ban specific domains
    # banned_domains:
    #   - "*.tempmail.com"

    # Rate limiting for registrations (prevent abuse)
    rate_limiting:
      registration:
        burst: 5              # Allow 5 registrations in burst
        per_second: 0.001     # ~1 registration per 15 minutes from same IP
      login:
        per_ip:
          burst: 10
          per_second: 0.1
        per_account:
          burst: 1800
          per_second: 0.5
      account_recovery:
        per_ip:
          burst: 3
          per_second: 0.0008
        per_address:
          burst: 3
          per_second: 0.0002

