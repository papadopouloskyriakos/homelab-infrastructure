http:
  public_base: https://mas.example.net
  listeners:
    # Public listener — user-facing only (exposed via nginx)
    - name: web
      resources:
        - name: discovery
        - name: human
        - name: oauth
        - name: compat
        - name: assets
      binds:
        - address: "0.0.0.0:9090"
    # Internal listener — admin only (localhost, never exposed to internet)
    - name: internal
      resources:
        - name: graphql
          playground: false
        - name: adminapi
        - name: health
      binds:
        - address: "127.0.0.1:9091"

