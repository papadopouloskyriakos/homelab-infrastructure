events {
    worker_connections 1024;
}

http {
    # Trust HAProxy and extract real client IP
    set_real_ip_from 10.255.0.0/16;
    set_real_ip_from 10.0.X.X/27;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (applied globally)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Note: X-Frame-Options intentionally omitted — Grafana dashboards are embedded in Element

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ============================================
    # DEFAULT CATCH-ALL — reject unknown Host headers
    # ============================================
    server {
        listen 443 ssl http2 default_server;
        listen 6666 default_server;
        server_name _;
        ssl_certificate /etc/letsencrypt/live/matrix.example.net/fullchain6.pem;
        ssl_certificate_key /etc/letsencrypt/live/matrix.example.net/privkey6.pem;
        return 444;
    }

    # ============================================
    # MAS SERVER - mas.example.net
    # ============================================
    server {
        listen 6666;
        listen 443 ssl http2;

        server_name mas.example.net;

        ssl_certificate /etc/letsencrypt/live/matrix.example.net/fullchain6.pem;
        ssl_certificate_key /etc/letsencrypt/live/matrix.example.net/privkey6.pem;

        # Proxy everything to MAS
        location / {
            proxy_pass http://127.0.0.1:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    # ============================================
    # MATRIX SERVER - matrix.example.net
    # ============================================
    server {
        listen 6666;
        listen 443 ssl http2;

        server_name matrix.example.net;

        ssl_certificate /etc/letsencrypt/live/matrix.example.net/fullchain6.pem;
        ssl_certificate_key /etc/letsencrypt/live/matrix.example.net/privkey6.pem;

        # ============================================
        # MAS COMPATIBILITY ENDPOINTS
        # ============================================
        
        # Matrix auth endpoints handled by MAS (login/logout/refresh)
        location ~ ^/_matrix/client/(.*)/(login|logout|refresh) {
            proxy_pass http://127.0.0.1:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }

        # ============================================
        # NTFY / UNIFIEDPUSH
        # ============================================

        # UnifiedPush discovery endpoint (= exact match to beat the /_matrix regex)
        location = /_matrix/push/v1/notify {
            proxy_pass http://127.0.0.1:8880/_matrix/push/v1/notify;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ntfy on /ntfy/ sub-path
        location /ntfy/ {
            proxy_pass http://127.0.0.1:8880/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }

        # ntfy UnifiedPush topic subscriptions (up* topics accessed at root by ntfy app)
        location ~ ^/(up[a-zA-Z0-9_-]+)(/.*)? {
            proxy_pass http://127.0.0.1:8880/$1$2$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for persistent subscriptions
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }

        # ============================================
        # WELL-KNOWN ENDPOINTS
        # ============================================

        # OpenID Connect Discovery - Point to MAS subdomain
        location = /.well-known/openid-configuration {
            return 301 https://mas.example.net/.well-known/openid-configuration;
        }

        # Client discovery - Point to MAS subdomain
        location = /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{
                "m.homeserver": {
                    "base_url": "https://matrix.example.net"
                },
                "m.REDACTED_6fa691d2": {
                    "issuer": "https://mas.example.net/",
                    "account": "https://mas.example.net/account/"
                },
                "org.matrix.msc2965.REDACTED_6fa691d2": {
                    "issuer": "https://mas.example.net/",
                    "account": "https://mas.example.net/account/"
                }
            }';
        }

        # Server discovery for federation
        location = /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization";
            return 200 '{"m.server": "matrix.example.net:443"}';
        }

        # ============================================
        # MATRIX SYNAPSE
        # ============================================

        # Matrix client API, WebSocket & MAS callbacks
        location ~ ^(/_matrix|/_synapse/client|/_synapse/mas) {
            client_max_body_size 200M;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_pass http://127.0.0.1:8008;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }

        # ============================================
        # BRIDGES & WEBHOOKS
        # ============================================

        location /webhook/ {
            proxy_pass http://127.0.0.1:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }

        location /bridge/ {
            proxy_pass http://127.0.0.1:9995/bridge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }

        # ============================================
        # ADMIN INTERFACE
        # ============================================

        location /admin {
            proxy_pass http://127.0.0.1:8008/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }

        # ============================================
        # ELEMENT WEB UI (MUST BE LAST)
        # ============================================

        location / {
            proxy_pass http://127.0.0.1:8088/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
