---
# Cisco Configuration Deployment Playbook
# Applies hierarchical configuration changes generated by generate_diff.py

- name: Deploy Cisco Configuration Changes
  hosts: localhost
  gather_facts: no
  
  vars:
    # These are passed from GitLab CI
    target_device: "{{ target_device }}"
    device_type: "{{ device_type }}"
    ansible_user: "{{ ansible_user | default('kyriakosp') }}"
    ansible_password: "{{ ansible_password }}"
    diff_blocks: "{{ diff_blocks | default([]) }}"
    
    # Connection parameters
    ansible_connection: network_cli
    ansible_network_os: "{{ 'cisco.asa.asa' if device_type == 'Firewall' else 'cisco.ios.ios' }}"
    ansible_become: yes
    ansible_become_method: enable
    
  tasks:
    - name: Display deployment summary
      debug:
        msg:
          - "🚀 Deploying to: {{ target_device }}"
          - "📋 Device type: {{ device_type }}"
          - "🔧 Network OS: {{ ansible_network_os }}"
          - "📦 Configuration blocks: {{ diff_blocks | length }}"
    
    - name: Fail if no diff blocks provided
      fail:
        msg: "No configuration changes to apply (diff_blocks is empty)"
      when: diff_blocks | length == 0
    
    - name: Backup current running config
      block:
        - name: Backup running config (IOS)
          cisco.ios.ios_command:
            commands:
              - show running-config
          register: backup_result
          delegate_to: "{{ target_device }}.example.net"
          when: device_type != 'Firewall'
        
        - name: Backup running config (ASA)
          cisco.asa.asa_command:
            commands:
              - show running-config
          register: backup_result
          delegate_to: "{{ target_device }}.example.net"
          when: device_type == 'Firewall'
        
        - name: Save backup to file
          copy:
            content: "{{ backup_result.stdout[0] }}"
            dest: "backups/{{ target_device }}_{{ ansible_date_time.epoch }}.cfg"
          delegate_to: localhost
      
      rescue:
        - name: Log backup failure
          debug:
            msg: "⚠️  Failed to create backup - continuing anyway"
    
    - name: Apply configuration blocks (IOS)
      cisco.ios.ios_config:
        lines: "{{ item.lines }}"
        parents: "{{ item.parents | default([]) }}"
        match: line
        save_when: changed
        backup: no  # We already backed up above
      loop: "{{ diff_blocks }}"
      loop_control:
        label: "Block with {{ item.lines | length }} lines (parents: {{ item.parents | default([]) | length }})"
      register: deploy_result
      delegate_to: "{{ target_device }}.example.net"
      when: device_type != 'Firewall'
      failed_when: deploy_result.failed
    
    - name: Apply configuration blocks (ASA)
      cisco.asa.asa_config:
        lines: "{{ item.lines }}"
        parents: "{{ item.parents | default([]) }}"
        match: line
        save_when: changed
        backup: no
      loop: "{{ diff_blocks }}"
      loop_control:
        label: "Block with {{ item.lines | length }} lines (parents: {{ item.parents | default([]) | length }})"
      register: deploy_result
      delegate_to: "{{ target_device }}.example.net"
      when: device_type == 'Firewall'
      failed_when: deploy_result.failed
    
    - name: Display deployment results
      debug:
        msg:
          - "✅ Deployment completed"
          - "📊 Blocks applied: {{ diff_blocks | length }}"
          - "🔄 Changes made: {{ deploy_result.changed }}"
    
    - name: Verify device connectivity post-deployment
      block:
        - name: Check device version (IOS)
          cisco.ios.ios_command:
            commands:
              - show version | include uptime
          register: verify_result
          delegate_to: "{{ target_device }}.example.net"
          when: device_type != 'Firewall'
        
        - name: Check device version (ASA)
          cisco.asa.asa_command:
            commands:
              - show version | include up
          register: verify_result
          delegate_to: "{{ target_device }}.example.net"
          when: device_type == 'Firewall'
        
        - name: Display verification result
          debug:
            msg: "✅ Device is responsive: {{ verify_result.stdout[0] }}"
      
      rescue:
        - name: Log verification warning
          debug:
            msg: "⚠️  Post-deployment verification failed (non-critical)"