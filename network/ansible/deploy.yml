---
################################################################################
# Cisco Configuration Deployment Playbook (Dynamic Inventory)
#
# This playbook deploys configuration changes to a SINGLE Cisco device
# identified by the GitLab CI pipeline through dynamic inventory.
#
# Key Features:
# - Works with dynamically-generated single-device inventory
# - Supports IOS, IOS-XE, and ASA devices
# - Uses intelligent diff from validation stage
# - Creates automatic backups before changes
# - Validates changes post-deployment
#
# Usage:
#   ansible-playbook deploy.yml \
#     -i inventory.yml \              # Dynamic inventory with ONE device
#     -e "REDACTED_3541d824" \
#     -e "REDACTED_3c23f762"
#
################################################################################

- name: Deploy Cisco Configuration Changes
  hosts: all  # Will be limited to single device by dynamic inventory
  gather_facts: no
  connection: network_cli
  
  vars:
    backup_dir: "backups"
    deployment_timeout: 300
    
  tasks:
    
    # ========================================================================
    # PRE-DEPLOYMENT CHECKS
    # ========================================================================
    
    - name: Display deployment information
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "🚀 DEPLOYING TO: {{ inventory_hostname }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Device Type: {{ device_type }}"
          - "Network OS: {{ ansible_network_os }}"
          - "Config Source: {{ config_file }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      delegate_to: localhost
      
    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      
    # ========================================================================
    # BACKUP CURRENT CONFIGURATION
    # ========================================================================
    
    - name: Create backup of current running configuration (IOS)
      cisco.ios.ios_config:
        backup: yes
        backup_options:
          filename: "{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.cfg"
          dir_path: "{{ backup_dir }}"
      when: ansible_network_os == 'cisco.ios.ios'
      register: backup_ios
      
    - name: Create backup of current running configuration (ASA)
      cisco.asa.asa_config:
        backup: yes
        backup_options:
          filename: "{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.cfg"
          dir_path: "{{ backup_dir }}"
      when: ansible_network_os == 'cisco.asa.asa'
      register: backup_asa
      
    - name: Display backup location
      debug:
        msg: "✅ Backup created: {{ backup_dir }}/{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.cfg"
      delegate_to: localhost
      
    # ========================================================================
    # DEPLOY NEW CONFIGURATION
    # ========================================================================
    
    - name: Deploy new configuration to IOS device
      cisco.ios.ios_config:
        src: "{{ config_file }}"
        backup: no  # Already backed up above
        save_when: modified
        diff_against: running
      when: ansible_network_os == 'cisco.ios.ios'
      register: deploy_ios
      timeout: "{{ deployment_timeout }}"
      
    - name: Deploy new configuration to ASA device
      cisco.asa.asa_config:
        src: "{{ config_file }}"
        backup: no  # Already backed up above
        save_when: modified
        diff_against: running
      when: ansible_network_os == 'cisco.asa.asa'
      register: deploy_asa
      timeout: "{{ deployment_timeout }}"
      
    # ========================================================================
    # POST-DEPLOYMENT VERIFICATION
    # ========================================================================
    
    - name: Display deployment results
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "📊 DEPLOYMENT RESULTS"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Device: {{ inventory_hostname }}"
          - "Changed: {{ (deploy_ios.changed | default(false)) or (deploy_asa.changed | default(false)) }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      delegate_to: localhost
      
    - name: Show configuration changes (IOS)
      debug:
        var: deploy_ios.updates
      when:
        - ansible_network_os == 'cisco.ios.ios'
        - deploy_ios.changed
        
    - name: Show configuration changes (ASA)
      debug:
        var: deploy_asa.updates
      when:
        - ansible_network_os == 'cisco.asa.asa'
        - deploy_asa.changed
        
    - name: Verify device connectivity post-deployment (IOS)
      cisco.ios.ios_command:
        commands:
          - show version | include uptime
      when: ansible_network_os == 'cisco.ios.ios'
      register: verify_ios
      
    - name: Verify device connectivity post-deployment (ASA)
      cisco.asa.asa_command:
        commands:
          - show version | include up
      when: ansible_network_os == 'cisco.asa.asa'
      register: verify_asa
      
    - name: Display verification results
      debug:
        msg:
          - "✅ Device is responsive and operational"
          - "{{ verify_ios.stdout[0] | default(verify_asa.stdout[0] | default('')) }}"
      delegate_to: localhost
      
    # ========================================================================
    # FINAL STATUS
    # ========================================================================
    
    - name: Deployment complete
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✅ DEPLOYMENT SUCCESSFUL"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Device: {{ inventory_hostname }}"
          - "Backup: {{ backup_dir }}/{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.cfg"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      delegate_to: localhost