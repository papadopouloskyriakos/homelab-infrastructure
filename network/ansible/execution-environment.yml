---
version: 3

# Extend the official AWX EE (contains ansible-core + most collections)
images:
  base_image:
    name: quay.io/ansible/awx-ee:latest

dependencies:
  # Python packages required by your custom scripts
  python:
    - ciscoconfparse==1.9.41
    - dnspython==2.6.1
    - netmiko
    - pyyaml

  # Cisco collections – baked in so you don’t need ansible-galaxy install at runtime
  galaxy:
    collections:
      - cisco.ios
      - cisco.asa

# Optional: nice label so you know which version is running
additional_build_steps:
  prepend_final:
    - RUN echo "Custom Cisco EE – built $(date)" > /etc/cisco-ee-build.txt
    - LABEL maintainer="your-team@example.net"
    - LABEL version="1.0"