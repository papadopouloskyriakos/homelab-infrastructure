version 17.9
service timestamps debug datetime msec
service timestamps log datetime msec localtime show-timezone
service password-encryption
!
hostname nlrtr01
!
logging buffered 1048576 warnings
logging console warnings
no logging monitor
!
ip name-server 10.0.X.X 10.0.X.X
ip domain name example.net
!
interface GigabitEthernet0/0/0
 description UPLINK-TO-SWITCH
 ip address 10.0.X.X 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/2
 description NEW-LINK
 ip address 10.100.100.1 255.255.255.0
 no shutdown
!
router bgp 65000
 bgp router-id 10.0.X.X
 neighbor 10.0.X.X remote-as 65001
 neighbor 10.0.X.X remote-as 65001
 neighbor 10.0.X.X remote-as 65001
!
ip route 0.0.0.0 0.0.0.0 10.0.X.X
!
access-list 10 permit 10.0.X.X 0.0.0.255
access-list 10 deny   any
!
line vty 0 4
 access-class 10 in
 transport input ssh
!
end
