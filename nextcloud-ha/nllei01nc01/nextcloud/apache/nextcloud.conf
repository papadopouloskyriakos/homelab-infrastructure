<VirtualHost *:80>
    ServerName nextcloud.example.net
    ServerAlias nextcloud.example.net

    # Redirect HTTP traffic to HTTPS
    Redirect permanent / https://nextcloud.example.net/

    ErrorLog ${APACHE_LOG_DIR}/nextcloud_error.log
    CustomLog ${APACHE_LOG_DIR}/nextcloud_access.log combined
    LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined
</VirtualHost>

<VirtualHost *:443>
    ServerName nextcloud.example.net
    ServerAlias nextcloud.example.net
    DocumentRoot /var/www/nextcloud

#    Alias /.well-known/security.txt /var/www/html/.well-known/security.txt

    # SSL Configuration
    SSLEngine on
    
    SSLCompression          off
    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECD>
    SSLHonorCipherOrder     off
    SSLSessionTickets       off
    ServerSignature         off
    
    SSLCertificateFile /etc/ssl/certs/example.net_fullchain.pem
    SSLCertificateKeyFile /etc/ssl/private/example.net_cert.pem.key

    <Directory /var/www/nextcloud/>
        Options +FollowSymLinks
        AllowOverride All
        Require all granted
        <IfModule mod_dav.c>
            Dav off
        </IfModule>
        SetEnv HOME /var/www/nextcloud
        SetEnv HTTP_HOME /var/www/nextcloud
    </Directory>
    
    # Expose the PHP Status Page
    <Location "/status">
        SetHandler "proxy:fcgi://127.0.0.1:9000"
        Require ip 10.0.X.X/16
    </Location>

    Alias /opcache /var/www/opcache

    <Directory /var/www/opcache>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require ip 10.0.X.X/16
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    <IfModule mod_brotli.c>
        AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/xml text/css text/javascript application/javascript application/json application/xml
    </IfModule>

    # Protocols for HTTP/2 and HTTP/1.1
    Protocols h2 http/1.1

    ErrorLog ${APACHE_LOG_DIR}/nextcloud_error_ssl.log
    CustomLog ${APACHE_LOG_DIR}/nextcloud_access_ssl.log combined
    LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined

Timeout 300
ProxyTimeout 300
ProxyBadHeader Ignore

# Add a more specific rule above the generic /exapps/ proxy
ProxyPass /exapps/context_chat_backend/ http://10.0.X.X:24002/
ProxyPassReverse /exapps/context_chat_backend/ http://10.0.X.X:24002/
ProxyPass /exapps/llm2/ http://10.0.X.X:24003/
ProxyPassReverse /exapps/llm2/ http://10.0.X.X:24003/
ProxyPass /exapps/text2image_stablediffusion2/ http://10.0.X.X:24004/
ProxyPassReverse /exapps/text2image_stablediffusion2/ http://10.0.X.X:24004/

    # Proxy AppAPI requests to the HARPy daemon
    # ProxyPass /exapps/ http://10.0.X.X:8780/exapps/ connectiontimeout=1800 timeout=1800
    # ProxyPassReverse /exapps/ http://10.0.X.X:8780/exapps/
    # Preserve client information for HARPy
#    ProxyPreserveHost On
#    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
#    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
#    RequestHeader set X-Forwarded-Host %{HTTP_HOST}s
#    RequestHeader set X-Forwarded-Proto https
# Preserve and trust headers from HAProxy
#RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
#RequestHeader set X-Forwarded-For "%{X-Forwarded-For}i"
#RequestHeader set X-Real-IP "%{X-Forwarded-For}i"
#RequestHeader set X-Forwarded-Host "%{HTTP_HOST}i"

</VirtualHost>
